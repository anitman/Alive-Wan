# Joint Audio-Video DiT Configuration
# Combines Wan2.x Video DiT with Audio DiT via TA-CrossAttn and UniTemp-RoPE

model:
  name: "JointAVDiT"
  type: "dual_stream_single_stream"

  # Dual Stream Phase
  dual_stream:
    enabled: true
    num_blocks: 16
    
    video:
      # Wan2.x Video DiT settings
      base_model: "wan2.1-14b"  # or "wan2.2-a14b"
      hidden_dim: 4096
      num_heads: 32
      head_dim: 128
      num_blocks: 16
      load_pretrained: true
      pretrained_path: "./models/wan2.1-t2v-14b"
      freeze: true  # Keep frozen during initial training
    
    audio:
      # Audio DiT settings (from audio_dit.yaml)
      hidden_dim: 1536
      num_heads: 24
      head_dim: 64
      num_blocks: 16
      load_pretrained: true
      pretrained_path: "./models/audio_dit_pretrained.pt"
      freeze: false  # Low learning rate fine-tuning
      learning_rate_scale: 0.1  # 10x lower LR to prevent catastrophic forgetting
    
    # TA-CrossAttn: Time-Aligned Cross Attention
    ta_cross_attn:
      enabled: true
      type: "bidirectional"  # audio→video and video→audio
      
      audio_to_video:
        dim: 1536
        num_heads: 24
        head_dim: 64
        dropout: 0.0
        qkv_bias: true
      
      video_to_audio:
        dim: 4096
        num_heads: 32
        head_dim: 128
        dropout: 0.0
        qkv_bias: true
      
      # RoPE settings for time alignment
      rope:
        type: "uni_temp_rope"
        dim: 64
        video_fps: 24
        video_temporal_compress: 4  # Wan-VAE 4:1 compression
        audio_sr: 16000
        audio_temporal_compress: 320  # Depends on Audio VAE

  # Single Stream Phase
  single_stream:
    enabled: true
    num_blocks: 40
    
    video:
      hidden_dim: 4096
      num_heads: 32
      head_dim: 128
    
    audio:
      hidden_dim: 1536
      num_heads: 24
      head_dim: 64
    
    # Joint processing: concatenate video+audio latents
    joint:
      concat_dim: 5632  # 4096 + 1536
      projection:
        enabled: true
        dim: 4096  # Project back to video dim for unified processing

  # Text encoders
  text_encoders:
    # Primary: Qwen3 (replaces T5-XXL for stronger natural language understanding)
    #   8B variant: hidden_size=4096, drop-in (no projection needed)
    #   4B variant: hidden_size=2560, auto-projects to target_dim=4096
    qwen3:
      model: "Qwen/Qwen3-8B"  # or "Qwen/Qwen3-4B"
      variant: "8b"            # "8b" or "4b"
      target_dim: 4096
      max_length: 512
      freeze: true
      pooling: "last_hidden"   # "last_hidden" | "mean" | "eos"
      load_pretrained: true

    # Secondary: Qwen2.5-32B (optional, for enhanced understanding)
    qwen2:
      enabled: false  # Enable if GPU memory allows
      model: "Qwen/Qwen2.5-32B-Instruct"
      dim: 4096
      max_length: 1024
      load_pretrained: true
      use_last_hidden: true

    # Legacy: T5-XXL (kept for compatibility, not recommended)
    # t5:
    #   model: "google/flan-t5-xxl"
    #   dim: 4096
    #   max_length: 512
    #   load_pretrained: true

  # Wan2.2 MoE support (if using Wan2.2)
  moe:
    enabled: false  # Set to true for Wan2.2
    num_experts: 2
    expert_switch:
      type: "snr_based"  # or "timestep_based"
      threshold: 0.5
    
    experts:
      high_noise:
        # For t ≥ t_moe: global structure
        dim: 4096
        ffn_expansion: 4.0
      low_noise:
        # For t < t_moe: detail refinement
        dim: 4096
        ffn_expansion: 4.0
    
    # Audio DiT adaptation for MoE
    audio_moe:
      type: "shared_with_specialized_ta"  # Option C from spec
      # Shared Audio DiT主干 with specialized TA-CrossAttn per expert

# VAE settings
vae:
  video:
    type: "wan_vae"  # Wan-VAE or Wan2.2-VAE
    model: "./models/wan2.1-va"
    temporal_compress: 4
    spatial_compress: 8
    channels: 16
  
  audio:
    type: "wavvae"  # or "stable_audio" or "dac"
    model: "./models/audio_vae"
    temporal_compress: 320
    channels: 32

# Training settings
training:
  # Flow Matching (Rectified Flow)
  flow_matching:
    type: "rectified"
    sigma_min: 0.0001
    sigma_max: 100.0
    rho: 7.0
    timestep_sampling: "logit_normal"
    
  # Loss weighting
  loss:
    video_weight: 1.0
    audio_weight: 1.0
    sync_weight: 0.1  # Optional sync loss
    
  # Learning rates (asymmetric for preventing audio forgetting)
  learning_rates:
    video_dit: 0.0  # Frozen initially
    audio_dit: 1.0e-5  # Low LR
    ta_cross_attn: 1.0e-4  # Normal LR
    text_encoder: 0.0  # Frozen
  
  # Batch settings
  batch_size: 64
  grad_accumulation: 4
  grad_clip_norm: 1.0
  
  # EMA
  ema:
    decay: 0.9999
    update_every: 1
    # Higher decay for audio DiT specifically
    audio_decay: 0.99995

# Multi-CFG inference
inference:
  cfg:
    # Text prompt guidance
    text_cfg_scale: 7.5
    
    # Mutual cross-attention guidance (sync strength)
    mutual_cfg_scale: 2.0
    
    # Classifier-free guidance settings
    drop_text_prob: 0.1
    drop_mutual_prob: 0.05

# Resolution settings
resolution:
  base:
    width: 854   # 480P
    height: 480
    frames: 128  # ~5.3s at 24fps
    fps: 24
  
  refiner:
    width: 1920  # 1080P
    height: 1080
    frames: 128
    fps: 24